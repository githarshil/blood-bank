# Render Blueprint — optional one-click deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API (Node.js)
  - type: web
    name: blood-bank-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGIN
        sync: false

  # Frontend (React static site)
  - type: web
    name: blood-bank-frontend
    runtime: static
    plan: free
    buildCommand: cd blood-bank-frontend && npm install && npm run build
    staticPublishPath: blood-bank-frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
